<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarehouseOS — Tracking Platform</title>

<!-- Fonts: Inter for UI, JetBrains Mono for IDs / serials / SKUs -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Tabler icon font referenced throughout the markup -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/tabler-icons.min.css">

<script>
// Apply theme before paint to avoid a flash. Saved choice wins, else follow the OS.
(function(){
  var saved=null;
  try{saved=localStorage.getItem('whos-theme')}catch(e){}
  var dark = saved ? saved==='dark'
    : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if(dark) document.documentElement.setAttribute('data-theme','dark');
})();
</script>

<style>
/* ============================================================
   DESIGN TOKENS
   These were previously undefined, which is why the page fell
   back to bare browser defaults. Defining them here gives the
   whole interface its palette, type, and surface system.
   ============================================================ */
:root{
  /* Type */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Surfaces — cool, neutral, slightly layered for depth */
  --color-background-primary: #ffffff;     /* panels, cards, rows */
  --color-background-secondary: #f4f6f9;   /* sidebar, table heads, insets */
  --color-background-tertiary: #eef1f6;    /* app canvas behind content */

  /* Text */
  --color-text-primary: #161a20;
  --color-text-secondary: #5a6573;
  --color-text-tertiary: #98a2b3;

  /* Borders — hairlines that read crisp on light surfaces */
  --color-border-tertiary: #e6eaf0;
  --color-border-secondary: #d3dae3;

  /* Brand accent */
  --accent: #1f6feb;
  --accent-deep: #0e4fa8;
  --accent-wash: #e8f1fe;

  /* Radii */
  --border-radius-md: 8px;
  --border-radius-lg: 12px;

  /* Elevation */
  --shadow-sm: 0 1px 2px rgba(20,28,46,.05);
  --shadow-md: 0 4px 14px -4px rgba(20,28,46,.12), 0 2px 6px -2px rgba(20,28,46,.06);
  --shadow-lg: 0 18px 48px -12px rgba(20,28,46,.28);

  /* Status pill colors — themed so they stay legible in both modes */
  --badge-blue-bg:#e7f0fd;  --badge-blue-fg:#1257b0;
  --badge-green-bg:#e4f4e9; --badge-green-fg:#1d7a45;
  --badge-amber-bg:#fbeed6; --badge-amber-fg:#945007;
  --badge-red-bg:#fce8e8;   --badge-red-fg:#b4302f;
  --badge-gray-bg:#eef0f4;  --badge-gray-fg:#525c6b;

  /* Sidebar hover + topbar (differ per theme) */
  --nav-hover:#e7ecf3;
  --topbar-bg:rgba(255,255,255,.82);
}

/* ============================================================
   DARK THEME — a deep slate identity, not a flat inversion.
   Applied when <html data-theme="dark">.
   ============================================================ */
html[data-theme="dark"]{
  --color-background-primary:#161d2b;
  --color-background-secondary:#1b2433;
  --color-background-tertiary:#0e1420;

  --color-text-primary:#e8edf4;
  --color-text-secondary:#9aa6b8;
  --color-text-tertiary:#65728a;

  --color-border-tertiary:#27313f;
  --color-border-secondary:#34415a;

  --accent:#4f8ff7;
  --accent-deep:#3b82f6;
  --accent-wash:rgba(79,143,247,.16);

  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 6px 18px -6px rgba(0,0,0,.55),0 2px 6px -2px rgba(0,0,0,.4);
  --shadow-lg:0 22px 60px -14px rgba(0,0,0,.7);

  --badge-blue-bg:rgba(79,143,247,.18);  --badge-blue-fg:#83b1fb;
  --badge-green-bg:rgba(45,170,109,.18); --badge-green-fg:#5fd49a;
  --badge-amber-bg:rgba(217,148,46,.20); --badge-amber-fg:#e7b15f;
  --badge-red-bg:rgba(229,84,84,.18);    --badge-red-fg:#f0908f;
  --badge-gray-bg:rgba(148,163,184,.16); --badge-gray-fg:#a9b5c7;

  --nav-hover:#212c3d;
  --topbar-bg:rgba(22,29,43,.82);
  color-scheme:dark;
}

/* Smooth the transition when flipping themes */
body,.sidebar,.section,.stat,.topbar,.modal,.detail-panel,.table th,.nav-item,.field input,.field select,.search,.badge,.dl,.sidebar-card{
  transition:background-color .25s ease,color .25s ease,border-color .25s ease,box-shadow .25s ease;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}
body{
  font-family:var(--font-sans);
  color:var(--color-text-primary);
  background:var(--color-background-tertiary);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:14px;
  line-height:1.45;
}

::selection{background:var(--accent-wash);color:var(--accent-deep)}

/* ---------- Layout shell ---------- */
.app{display:flex;height:100vh;min-height:600px}

/* ---------- Sidebar ---------- */
.sidebar{
  width:224px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  padding:0 0 .75rem;
  background:var(--color-background-secondary);
  border-right:1px solid var(--color-border-tertiary);
}
.logo{
  display:flex;flex-direction:column;
  padding:1.15rem 1.15rem 1rem;
  margin-bottom:.5rem;
  font-size:15px;font-weight:700;letter-spacing:-.01em;
  border-bottom:1px solid var(--color-border-tertiary);
}
.logo .mark{display:flex;align-items:center;gap:9px;color:var(--color-text-primary)}
.logo .mark i{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--accent),var(--accent-deep));
  color:#fff;font-size:16px;box-shadow:var(--shadow-sm);
}
.logo span{
  color:var(--color-text-tertiary);font-size:11px;display:block;
  font-weight:500;margin-top:5px;text-transform:uppercase;letter-spacing:.07em;
  padding-left:35px;
}
.nav-group{padding:0 .6rem;display:flex;flex-direction:column;gap:2px}
.nav-label{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--color-text-tertiary);padding:.6rem .55rem .3rem;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:8px 10px;font-size:13.5px;font-weight:500;cursor:pointer;
  color:var(--color-text-secondary);
  border-radius:var(--border-radius-md);
  transition:background .12s ease,color .12s ease;
}
.nav-item:hover{background:var(--nav-hover);color:var(--color-text-primary)}
.nav-item.active{
  background:var(--color-background-primary);
  color:var(--accent-deep);font-weight:600;
  box-shadow:var(--shadow-sm);
}
.nav-item.active i{color:var(--accent)}
.nav-item i{font-size:18px;color:var(--color-text-tertiary);transition:color .12s ease}
.nav-item:hover i{color:var(--color-text-secondary)}
.sidebar-foot{margin-top:auto;padding:0 .6rem}
.sidebar-card{
  margin:.75rem .15rem 0;padding:.75rem .85rem;
  background:var(--color-background-primary);
  border:1px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  font-size:11.5px;color:var(--color-text-secondary);
}
.sidebar-card b{color:var(--color-text-primary);font-weight:600}
.sidebar-card .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#3aa76d;margin-right:6px;vertical-align:middle}

/* ---------- Main ---------- */
.main{flex:1;overflow-y:auto;background:var(--color-background-tertiary)}
.topbar{
  padding:.85rem 1.5rem;
  border-bottom:1px solid var(--color-border-tertiary);
  display:flex;align-items:center;gap:14px;
  background:var(--topbar-bg);backdrop-filter:saturate(180%) blur(8px);
  position:sticky;top:0;z-index:10;
}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:-.01em;flex:1}
.search{
  display:flex;align-items:center;gap:8px;
  background:var(--color-background-secondary);
  border:1px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  padding:7px 12px;width:280px;transition:border-color .12s ease,box-shadow .12s ease;
}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
.search input{border:none;background:transparent;font-size:13.5px;outline:none;color:var(--color-text-primary);width:100%;font-family:var(--font-sans)}
.search input::placeholder{color:var(--color-text-tertiary)}
.search i{color:var(--color-text-tertiary);font-size:17px}

/* ---------- Buttons ---------- */
.btn{
  padding:8px 14px;border-radius:var(--border-radius-md);
  font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--font-sans);border:1px solid transparent;
  transition:background .12s ease,border-color .12s ease,box-shadow .12s ease,transform .05s ease;
}
.btn:active{transform:translateY(1px)}
.btn i{font-size:16px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--accent-deep)}
.btn-outline{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.btn-outline:hover{background:var(--color-background-secondary);border-color:var(--color-text-tertiary)}
/* ---- Theme toggle : a clearly interactive segmented control ---- */
.theme-toggle{
  display:inline-flex;align-items:center;flex-shrink:0;gap:2px;padding:3px;
  background:var(--color-background-secondary);
  border:1px solid var(--color-border-secondary);
  border-radius:999px;
}
.theme-toggle button{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:30px;padding:0 13px;border:none;background:transparent;
  color:var(--color-text-secondary);font-family:var(--font-sans);
  font-size:12.5px;font-weight:600;cursor:pointer;border-radius:999px;
  transition:background .15s ease,color .15s ease,box-shadow .15s ease;
}
.theme-toggle button i{font-size:16px}
.theme-toggle button:hover{color:var(--color-text-primary)}
.theme-toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.theme-toggle button.on{
  background:var(--color-background-primary);
  color:var(--accent-deep);
  box-shadow:var(--shadow-sm);
}
.theme-toggle button.on i{color:var(--accent)}
html[data-theme="dark"] .theme-toggle button.on{color:var(--color-text-primary)}

/* ---------- Content ---------- */
.content{padding:1.5rem;max-width:1400px}

/* ---------- Stat cards ---------- */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
.stat{
  position:relative;
  background:var(--color-background-primary);
  border:1px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  padding:1.05rem 1.15rem;cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s ease,transform .15s ease,border-color .15s ease;
}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--color-border-secondary)}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;font-weight:500}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat-sub{font-size:11.5px;color:var(--color-text-tertiary);margin-top:6px}

/* ---------- Badges / status pills ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.005em;line-height:1.4}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85}
.badge-blue{background:var(--badge-blue-bg);color:var(--badge-blue-fg)}
.badge-green{background:var(--badge-green-bg);color:var(--badge-green-fg)}
.badge-amber{background:var(--badge-amber-bg);color:var(--badge-amber-fg)}
.badge-red{background:var(--badge-red-bg);color:var(--badge-red-fg)}
.badge-gray{background:var(--badge-gray-bg);color:var(--badge-gray-fg)}

/* ---------- Sections / tables ---------- */
.section{
  background:var(--color-background-primary);
  border-radius:var(--border-radius-lg);
  border:1px solid var(--color-border-tertiary);
  box-shadow:var(--shadow-sm);
  margin-bottom:1.5rem;overflow:hidden;
}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--color-border-tertiary)}
.section-header h2{font-size:14px;font-weight:600;letter-spacing:-.01em}
.section-count{font-size:12px;color:var(--color-text-tertiary);font-weight:500}

.table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.table th{
  text-align:left;padding:9px 1.25rem;font-size:10.5px;font-weight:600;
  color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);
}
.table td{padding:11px 1.25rem;border-bottom:1px solid var(--color-border-tertiary);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table tbody tr{transition:background .1s ease}
.table tr:last-child td{border-bottom:none}
.table tbody tr:hover td{background:var(--color-background-secondary)}
.mono{font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary);letter-spacing:-.01em}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--color-border-tertiary)}
.tab{padding:10px 1.25rem;font-size:13px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--color-text-primary)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* ---------- Modal ---------- */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(16,22,34,.5);backdrop-filter:blur(2px);z-index:100;align-items:center;justify-content:center;animation:fade .15s ease}
.modal-bg.open{display:flex}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:1px solid var(--color-border-tertiary);box-shadow:var(--shadow-lg);padding:1.5rem;width:520px;max-width:92vw;max-height:88vh;overflow-y:auto;animation:pop .18s cubic-bezier(.2,.7,.3,1)}
.modal h2{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:1.35rem}
.field{margin-bottom:1rem}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--color-border-secondary);
  border-radius:var(--border-radius-md);font-size:13px;font-family:var(--font-sans);
  background:var(--color-background-primary);color:var(--color-text-primary);
  transition:border-color .12s ease,box-shadow .12s ease;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-wash)}
.field textarea{min-height:80px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.newcat-row{display:none;gap:8px;margin-top:8px}
.newcat-row.open{display:flex}
.newcat-row input{flex:1}
.newcat-add{white-space:nowrap;flex-shrink:0}
.hint{font-size:11.5px;color:var(--color-text-tertiary);margin-top:6px;line-height:1.4}
.gen-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.gen-row input[type=number]{width:84px;flex:none}
.gen-row input[type=text]{flex:1}
.gen-row .btn{flex-shrink:0;white-space:nowrap}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem;padding-top:1.1rem;border-top:1px solid var(--color-border-tertiary)}

/* ---------- Timeline ---------- */
.timeline{padding:.5rem .25rem}
.timeline-item{display:flex;gap:13px;padding-bottom:1.25rem;position:relative}
.timeline-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:32px;bottom:2px;width:2px;background:var(--color-border-tertiary)}
.timeline-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--color-background-primary);color:var(--color-text-tertiary);z-index:1}
.timeline-dot.done{background:var(--accent);border-color:var(--accent);color:#fff}
.timeline-dot.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-wash)}
.timeline-dot i{font-size:15px}
.timeline-content{flex:1;padding-top:5px}
.timeline-title{font-size:13px;font-weight:600;margin-bottom:2px}
.timeline-meta{font-size:12px;color:var(--color-text-secondary)}

/* ---------- Filters ---------- */
.filter-bar{display:flex;gap:8px;padding:.75rem 1.25rem;border-bottom:1px solid var(--color-border-tertiary);flex-wrap:wrap}
.filter-btn{padding:5px 13px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans)}
.filter-btn.active{background:var(--accent-wash);color:var(--accent-deep);border-color:#9fc3f5}

.empty{text-align:center;padding:3rem;color:var(--color-text-tertiary);font-size:14px}

/* ---------- Detail panel ---------- */
.detail-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:380px;max-width:92vw;background:var(--color-background-primary);border-left:1px solid var(--color-border-tertiary);box-shadow:var(--shadow-lg);z-index:50;overflow-y:auto;padding:1.5rem;animation:slidein .2s cubic-bezier(.2,.7,.3,1)}
.detail-panel.open{display:block}
@keyframes slidein{from{transform:translateX(24px);opacity:0}to{transform:none;opacity:1}}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.detail-header h2{font-size:16px;font-weight:600;letter-spacing:-.01em}
.detail-header .btn{padding:6px 9px}
.dl{display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-size:13px;margin-bottom:1.5rem;padding:1rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.dt{color:var(--color-text-secondary);white-space:nowrap;font-weight:500}
.dd{color:var(--color-text-primary);font-weight:500;overflow:hidden;text-overflow:ellipsis}
.detail-subhead{font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}

/* Tracking link block */
.track-link{margin-bottom:1.5rem}
.track-url{display:block;font-size:12px;color:var(--accent);word-break:break-all;line-height:1.5;margin-bottom:10px;text-decoration:none}
.track-url:hover{text-decoration:underline}
.track-actions{display:flex;gap:8px}
.track-actions .btn{font-size:12px}

/* Toast */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 18px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Focus visibility (a11y) ---------- */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,.nav-item:focus-visible,.stat:focus-visible,tr:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ---------- Responsive ---------- */
@media(max-width:860px){
  .sidebar{width:64px}
  .logo span,.nav-item span,.nav-label,.sidebar-card{display:none}
  .logo{align-items:center;padding:1.15rem .5rem}
  .logo .mark{gap:0}
  .nav-item{justify-content:center;padding:10px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .search{width:auto;flex:1}
}
@media(max-width:520px){
  .stats-row{grid-template-columns:1fr 1fr;gap:10px}
  .content{padding:1rem}
  .topbar h1{font-size:15px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Warehouse tracking system for serial numbers, item tracking, and courier shipments</h2>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="mark"><i class="ti ti-building-warehouse" aria-hidden="true"></i>WarehouseOS</div>
      <span>Tracking Platform</span>
    </div>
    <div class="nav-group">
      <div class="nav-label">Operations</div>
      <div class="nav-item active" tabindex="0" role="button" onclick="switchPage('items')" onkeydown="if(event.key==='Enter')switchPage('items')"><i class="ti ti-package" aria-hidden="true"></i><span>Items</span></div>
      <div class="nav-item" tabindex="0" role="button" onclick="switchPage('serials')" onkeydown="if(event.key==='Enter')switchPage('serials')"><i class="ti ti-barcode" aria-hidden="true"></i><span>Serial numbers</span></div>
      <div class="nav-item" tabindex="0" role="button" onclick="switchPage('couriers')" onkeydown="if(event.key==='Enter')switchPage('couriers')"><i class="ti ti-truck-delivery" aria-hidden="true"></i><span>Couriers</span></div>

<script>
let currentPage = 'items';
let searchTerm = '';

const state = {
  items: [

  serials: [
    {sn:'SN-2024-78421',item:'Laptop 15" Pro',itemId:'ITM-001',assigned:'Order #10231',status:'Shipped',location:'In transit'},
    {sn:'SN-2024-78422',item:'Laptop 15" Pro',itemId:'ITM-001',assigned:'Stock',status:'In stock',location:'A1-03'},

    {id:'TRK-90008',courier:'Australia Post',service:'Standard',origin:'Sydney Warehouse',dest:'Brisbane, QLD',status:'Delivered',eta:'24 Jun 2026',items:['SN-2024-81009'],updated:'24 Jun 09:10',salesOrder:'SO-43997',ticket:'TKT-1170'},

    {id:'MOV-440',type:'Inbound',item:'Wireless Keyboard',sn:'SN-2024-33100',from:'Receiving',to:'B2-11',by:'Sara W.',date:'26 Jun 11:05'},

  ]
};

const itemStatuses = ['In stock','Low stock','Out of stock','Reserved'];
const courierStatuses = ['Processing','In transit','Out for delivery','Delivered','Failed'];
const courierNames = ['FedEx','Australia Post','DHL','StarTrack','Toll','TNT'];
const movTypes = ['Inbound','Outbound','Transfer'];
const categories = ['Electronics','Peripherals','Accessories','Furniture','Other'];

// Custom categories added on the fly are remembered on this device.
(function(){
  try{
    const saved=JSON.parse(localStorage.getItem('whos-categories')||'[]');
    if(Array.isArray(saved)) saved.forEach(c=>{ if(c && !categories.includes(c)) categories.push(c); });
  }catch(e){}
})();
function saveCategories(){ try{ localStorage.setItem('whos-categories', JSON.stringify(categories)); }catch(e){} }
function categoryOptions(selected){
  return categories.map(c=>`<option${c===selected?' selected':''}>${c}</option>`).join('')
    + '<option value="__new__">+ Add new category…</option>';
}

// Build a real carrier tracking URL from the courier + tracking ID.
const trackingUrlBuilders = {
  'FedEx':          id=>`https://www.fedex.com/fedextrack/?trknbr=${encodeURIComponent(id)}`,
  'Australia Post': id=>`https://auspost.com.au/mypost/track/details/${encodeURIComponent(id)}`,
  'DHL':            id=>`https://www.dhl.com/au-en/home/tracking.html?tracking-id=${encodeURIComponent(id)}`,
  'StarTrack':      id=>`https://startrack.com.au/track/search?id=${encodeURIComponent(id)}`,
  'Toll':           id=>`https://www.mytoll.com/?searchType=con&tracking=${encodeURIComponent(id)}`,
  'TNT':            id=>`https://www.tnt.com/express/en_au/site/tracking.html?cons=${encodeURIComponent(id)}`,
};
function trackingLink(c){
  const build = trackingUrlBuilders[c.courier];
  return build ? build(c.id) : `https://www.google.com/search?q=${encodeURIComponent(c.courier+' '+c.id+' tracking')}`;
}

function statusBadge(s){
  const map={
    'In stock':'badge-green','Low stock':'badge-amber','Out of stock':'badge-red','Reserved':'badge-blue',
    'In transit':'badge-blue','Delivered':'badge-green','Processing':'badge-gray','Out for delivery':'badge-amber','Failed':'badge-red',
    'Shipped':'badge-blue','Inbound':'badge-green','Outbound':'badge-amber','Transfer':'badge-blue'
  };
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
}

function switchPage(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['items','serials','couriers','movements','settings'].indexOf(page)].classList.add('active');
  document.getElementById('page-title').textContent = {items:'Items',serials:'Serial numbers',couriers:'Courier tracking',movements:'Movements',settings:'Settings'}[page];
  document.getElementById('add-label').textContent = {items:'Add item',serials:'Register serial',couriers:'New shipment',movements:'Log movement',settings:''}[page];
  document.getElementById('add-btn').style.display = page==='settings'?'none':'flex';
  closeDetail();
  render();
}

let activeFilter = 'all';
function render(){
  const q = searchTerm.toLowerCase();
  const el = document.getElementById('page-content');
  if(currentPage==='items') renderItems(el,q);
  else if(currentPage==='serials') renderSerials(el,q);
  else if(currentPage==='couriers') renderCouriers(el,q);
  else if(currentPage==='movements') renderMovements(el,q);
  else renderSettings(el);
}

function renderItems(el,q){
  let data = state.items.filter(i=>!q||(i.name+i.sku+i.id+i.category).toLowerCase().includes(q));
  const inStock=state.items.filter(i=>i.status==='In stock').length;
  const low=state.items.filter(i=>i.status==='Low stock').length;
  const out=state.items.filter(i=>i.status==='Out of stock').length;
  el.innerHTML=`
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Total items</div><div class="stat-value">${state.items.length}</div><div class="stat-sub">SKUs tracked</div></div>
    <div class="stat"><div class="stat-label">In stock</div><div class="stat-value" style="color:var(--badge-green-fg)">${inStock}</div><div class="stat-sub">Available</div></div>
    <div class="stat"><div class="stat-label">Low stock</div><div class="stat-value" style="color:var(--badge-amber-fg)">${low}</div><div class="stat-sub">Below threshold</div></div>
    <div class="stat"><div class="stat-label">Out of stock</div><div class="stat-value" style="color:var(--badge-red-fg)">${out}</div><div class="stat-sub">Needs replenishment</div></div>
  </div>
  <div class="section">
    <div class="section-header"><h2>Inventory</h2><span class="section-count">${data.length} items</span></div>
    <table class="table">
      <thead><tr><th style="width:90px">Item ID</th><th style="width:200px">Name</th><th style="width:110px">SKU</th><th style="width:120px">Category</th><th style="width:90px">Location</th><th style="width:60px;text-align:right">Qty</th><th style="width:124px">Status</th></tr></thead>
      <tbody>${data.length?data.map(i=>`<tr style="cursor:pointer" onclick="showItemDetail('${i.id}')">
        <td class="mono">${i.id}</td><td style="font-weight:600">${i.name}</td><td class="mono">${i.sku}</td><td>${i.category}</td><td class="mono">${i.location}</td>
        <td style="text-align:right;font-weight:600">${i.qty}</td><td>${statusBadge(i.status)}</td>
      </tr>`).join(''):'<tr><td colspan="7"><div class="empty">No items match your search</div></td></tr>'}</tbody>
    </table>
  </div>`;
}

function renderSerials(el,q){
  let data = state.serials.filter(i=>!q||(i.sn+i.item+i.assigned+i.status).toLowerCase().includes(q));
  el.innerHTML=`

    <div class="stat"><div class="stat-label">Registered serials</div><div class="stat-value">${state.serials.length}</div><div class="stat-sub">Units tracked</div></div>

    <div class="stat"><div class="stat-label">Total shipments</div><div class="stat-value">${state.couriers.length}</div><div class="stat-sub">Active records</div></div>

function renderSettings(el){
  el.innerHTML=`<div class="section"><div class="section-header"><h2>System settings</h2></div>
  <div style="padding:1.5rem;display:grid;gap:1rem;max-width:480px">
    <div class="field"><label>Warehouse name</label><input type="text" value="Sydney Main Warehouse"></div>

function handleSearch(){
  searchTerm = document.getElementById('global-search').value;
  render();
}

  const titles={items:'Add item',serials:'Register serial number',couriers:'New shipment',movements:'Log movement'};
  document.getElementById('modal-title').textContent = titles[currentPage]||'Add';

function getModalForm(){

    <div class="field-row"><div class="field"><label>Item name</label><input id="f-name" type="text" placeholder="e.g. Laptop 15 Pro"></div>

    <div class="field-row"><div class="field"><label>Qty</label><input id="f-qty" type="number" value="0" min="0"></div>

  if(currentPage==='serials') return `
    <div class="field"><label>Item</label><select id="f-item">${state.items.map(i=>`<option value="${i.id}">${i.name}</option>`).join('')}</select></div>
    <div class="field"><label>Serial number(s)</label>
      <textarea id="f-sn" placeholder="Enter one serial number per line — e.g.&#10;SN-2024-90001&#10;SN-2024-90002"></textarea>

        <button type="button" class="btn btn-outline" onclick="generateSerials()"><i class="ti ti-wand" aria-hidden="true"></i>Auto-fill</button>

    </div>

    <div class="field"><label>Location</label><input id="f-loc" type="text" placeholder="e.g. A1-03"></div></div>
    <div class="field"><label>Status</label><select id="f-status"><option>In stock</option><option>Shipped</option><option>Delivered</option><option>Processing</option></select></div>`;
  if(currentPage==='couriers') return `
    <div class="field"><label>Tracking ID</label><input id="f-id" type="text" placeholder="e.g. TRK-90020"></div>
    <div class="field-row"><div class="field"><label>Courier</label><select id="f-courier">${courierNames.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="field"><label>Service type</label><input id="f-service" type="text" placeholder="e.g. Express"></div></div>
    <div class="field-row"><div class="field"><label>Origin</label><input id="f-origin" type="text" value="Sydney Warehouse"></div>
    <div class="field"><label>Destination</label><input id="f-dest" type="text" placeholder="City, State"></div></div>
    <div class="field-row"><div class="field"><label>ETA</label><input id="f-eta" type="text" placeholder="27 Jun 2026"></div>
    <div class="field"><label>Status</label><select id="f-status">${courierStatuses.map(s=>`<option>${s}</option>`).join('')}</select></div></div>
    <div class="field-row"><div class="field"><label>Sales order #</label><input id="f-so" type="text" placeholder="e.g. SO-44050"></div>
    <div class="field"><label>Ticket #</label><input id="f-ticket" type="text" placeholder="e.g. TKT-1200"></div></div>`;
  if(currentPage==='movements') return `
    <div class="field-row"><div class="field"><label>Type</label><select id="f-type">${movTypes.map(t=>`<option>${t}</option>`).join('')}</select></div>

}

// ---------- On-the-fly item categories ----------
function onCatChange(){
  const sel=document.getElementById('f-cat');
  const row=document.getElementById('newcat-row');
  if(!sel||!row) return;
  if(sel.value==='__new__'){ row.classList.add('open'); const i=document.getElementById('f-newcat'); if(i) i.focus(); }
  else row.classList.remove('open');
}
function addCategory(name){
  name=(name||'').replace(/[<>]/g,'').trim();
  if(!name) return null;
  if(!categories.includes(name)){
    const oi=categories.indexOf('Other');            // keep "Other" last
    if(oi>-1) categories.splice(oi,0,name); else categories.push(name);
    saveCategories();
  }
  return name;
}
function addNewCategory(){
  const inp=document.getElementById('f-newcat');
  const name=addCategory(inp.value);
  if(!name){ inp.focus(); return; }
  const sel=document.getElementById('f-cat');
  sel.innerHTML=categoryOptions(name);
  document.getElementById('newcat-row').classList.remove('open');
  inp.value='';
  showToast('Category “'+name+'” added');
}

// ---------- Bulk serial registration helpers ----------
function parseSerialLines(raw){
  return (raw||'').split(/[\n,]+/).map(x=>x.trim()).filter(Boolean);
}
function generateSerials(){
  const count=Math.max(1,Math.min(500,parseInt(document.getElementById('f-gencount').value)||1));
  const prefix=(document.getElementById('f-genprefix').value||'SN-2024-').trim();
  const ta=document.getElementById('f-sn');
  // Continue numbering past anything already registered or typed, to avoid clashes
  const pool=state.serials.map(s=>s.sn).concat(parseSerialLines(ta.value));
  const nums=pool.map(s=>{const m=s.match(/(\d+)\s*$/);return m?parseInt(m[1]):0;});
  const start=(nums.length?Math.max(...nums):0)+1;
  const out=[];
  for(let i=0;i<count;i++) out.push(prefix+String(start+i).padStart(5,'0'));
  ta.value=(ta.value.trim()?ta.value.trim()+'\n':'')+out.join('\n');
}

function saveModal(){
  const now = new Date();
  const dateStr = `${now.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(currentPage==='items'){
    const name=document.getElementById('f-name').value||'New Item';
    const n=state.items.length+1;
    let cat=document.getElementById('f-cat').value;
    if(cat==='__new__') cat = addCategory(document.getElementById('f-newcat').value) || 'Other';
    state.items.push({id:`ITM-${String(n).padStart(3,'0')}`,name,sku:document.getElementById('f-sku').value||'SKU-NEW',category:cat,location:document.getElementById('f-loc').value||'-',qty:parseInt(document.getElementById('f-qty').value)||0,status:document.getElementById('f-status').value});
  } else if(currentPage==='serials'){
    const itemId=document.getElementById('f-item').value;
    const item=state.items.find(i=>i.id===itemId);
    let sns=parseSerialLines(document.getElementById('f-sn').value);
    if(!sns.length) sns=[`SN-2024-${Math.floor(Math.random()*90000+10000)}`];
    const assigned=document.getElementById('f-assigned').value||'Stock';
    const status=document.getElementById('f-status').value;
    const loc=document.getElementById('f-loc').value||'-';
    const seen=new Set(state.serials.map(s=>s.sn));
    let added=0,skipped=0;
    sns.forEach(sn=>{
      if(seen.has(sn)){skipped++;return;}
      seen.add(sn);
      state.serials.push({sn,item:item?item.name:'Unknown',itemId,assigned,status,location:loc});
      added++;
    });
    showToast(`Registered ${added} serial${added!==1?'s':''}`+(skipped?` · ${skipped} duplicate${skipped!==1?'s':''} skipped`:''));
  } else if(currentPage==='couriers'){
    state.couriers.push({id:document.getElementById('f-id').value||`TRK-${Math.floor(Math.random()*9000+90000)}`,courier:document.getElementById('f-courier').value,service:document.getElementById('f-service').value||'Standard',origin:document.getElementById('f-origin').value,dest:document.getElementById('f-dest').value||'Unknown',status:document.getElementById('f-status').value,eta:document.getElementById('f-eta').value||'TBD',items:[],updated:dateStr,salesOrder:document.getElementById('f-so').value||'',ticket:document.getElementById('f-ticket').value||''});
  } else if(currentPage==='movements'){
    const snVal=document.getElementById('f-sn').value;
    const ser=state.serials.find(s=>s.sn===snVal);
    const n=state.movements.length+1;
    state.movements.unshift({id:`MOV-${440+n}`,type:document.getElementById('f-type').value,item:ser?ser.item:'Unknown',sn:snVal,from:document.getElementById('f-from').value||'-',to:document.getElementById('f-to').value||'-',by:document.getElementById('f-by').value||'Staff',date:`26 Jun ${dateStr.split(' ').pop()}`});
  }
  closeModalDirect();
  render();
}

function closeModal(e){if(e.target===document.getElementById('modal-bg'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-bg').classList.remove('open');}

    <div class="dl"><span class="dt">Item ID</span><span class="dd mono">${i.id}</span>
    <span class="dt">SKU</span><span class="dd mono">${i.sku}</span>
    <span class="dt">Category</span><span class="dd">${i.category}</span>
    <span class="dt">Location</span><span class="dd mono">${i.location}</span>
    <span class="dt">Quantity</span><span class="dd">${i.qty}</span>

    <span class="dt">Assigned</span><span class="dd">${s.assigned}</span>

    <span class="dt">Status</span><span class="dd">${statusBadge(s.status)}</span></div>
    <div class="detail-subhead">Movement history</div>

      <div class="timeline-dot ${idx===0?'active':'done'}"><i class="ti ti-${m.type==='Inbound'?'arrow-down':m.type==='Outbound'?'arrow-up':'arrows-transfer-up'}" aria-hidden="true"></i></div>

function showCourierDetail(id){
  const c=state.couriers.find(x=>x.id===id);
  const steps=[
    {label:'Order created',done:true,icon:'ti-circle-check'},
    {label:'Processing',done:['Processing','In transit','Out for delivery','Delivered'].includes(c.status),icon:'ti-package'},

  document.getElementById('detail-body').innerHTML=`
    <div class="dl"><span class="dt">Courier</span><span class="dd">${c.courier}</span>
    <span class="dt">Service</span><span class="dd">${c.service}</span>
    <span class="dt">Origin</span><span class="dd">${c.origin}</span>
    <span class="dt">Destination</span><span class="dd">${c.dest}</span>
    <span class="dt">ETA</span><span class="dd">${c.eta}</span>
    <span class="dt">Sales order</span><span class="dd mono">${c.salesOrder||'—'}</span>
    <span class="dt">Ticket</span><span class="dd mono">${c.ticket||'—'}</span>
    <span class="dt">Status</span><span class="dd">${statusBadge(c.status)}</span>
    <span class="dt">Updated</span><span class="dd">${c.updated}</span></div>
    <div class="detail-subhead">Tracking link</div>
    <div class="track-link">
      <a href="${url}" target="_blank" rel="noopener" class="mono track-url" title="${url}">${url}</a>
      <div class="track-actions">
        <a href="${url}" target="_blank" rel="noopener" class="btn btn-outline" style="padding:6px 11px"><i class="ti ti-external-link" aria-hidden="true"></i>Open</a>
        <button class="btn btn-outline" style="padding:6px 11px" onclick="copyTracking('${c.id}',this)"><i class="ti ti-copy" aria-hidden="true"></i>Copy</button>
      </div>
    </div>
    <div class="detail-subhead">Shipment progress</div>
    <div class="timeline">${steps.map((s,i)=>`<div class="timeline-item">
      <div class="timeline-dot ${s.done?(i===active?'active':'done'):''}"><i class="ti ${s.icon}" aria-hidden="true"></i></div>
      <div class="timeline-content"><div class="timeline-title" style="color:${s.done?'var(--color-text-primary)':'var(--color-text-tertiary)'}">${s.label}</div></div>
    </div>`).join('')}</div>
    ${c.items.length?`<div class="detail-subhead">Items in shipment</div>${c.items.map(sn=>`<div class="mono" style="font-size:12px;padding:5px 0">${sn}</div>`).join('')}`:'<div style="font-size:13px;color:var(--color-text-tertiary)">No items linked</div>'}`;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){document.getElementById('detail-panel').classList.remove('open');}

// ---------- Tracking link copy ----------
function copyTracking(id,btn){
  const c=state.couriers.find(x=>x.id===id);
  if(!c) return;
  const url=trackingLink(c);
  const done=()=>{
    const original=btn.innerHTML;
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i>Copied';
    showToast('Tracking link copied');
    setTimeout(()=>{btn.innerHTML=original;},1600);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url,done));
  } else { fallbackCopy(url,done); }
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');cb();}catch(e){showToast('Copy failed — select the link manually');}
  document.body.removeChild(ta);
}
let toastTimer=null;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ---------- Theme toggle ----------
function setTheme(theme){
  const root = document.documentElement;
  if(theme==='dark') root.setAttribute('data-theme','dark');
  else root.removeAttribute('data-theme');
  try{ localStorage.setItem('whos-theme', theme); }catch(e){}
  syncThemeToggle();
}
function syncThemeToggle(){
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const lightBtn = document.getElementById('theme-light');
  const darkBtn = document.getElementById('theme-dark');
  if(!lightBtn||!darkBtn) return;
  lightBtn.classList.toggle('on', !isDark);
  darkBtn.classList.toggle('on', isDark);
  lightBtn.setAttribute('aria-pressed', String(!isDark));
  darkBtn.setAttribute('aria-pressed', String(isDark));
}
syncThemeToggle();

// Close panels on Escape
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalDirect();closeDetail();}});

render();
</script>
